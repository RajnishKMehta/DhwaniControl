# ───────────────────
# Main Branch — Release APK Build & GitHub Release
#
# Triggered on every push to `main`.
# Checks whether the current version already has a GitHub Release tag.
#   - If the tag EXISTS  → skips the build entirely (no duplicate release).
#   - If the tag MISSING → builds the release APK and publishes a GitHub Release.
#j
# Pre-release logic:
#   versionMajor == 0  →  marked as pre-release (early / beta)
#   versionMajor >= 1  →  marked as latest stable release
# ───────────────────

name: Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'app/build.gradle.kts'
 
permissions:
  contents: write
 
# Cancel previous builds when a new push happens
concurrency:
  group: release-apk
  cancel-in-progress: true
 
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 2. Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # 3. Gradle permission
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 4. Extract version
      - name: Extract version
        id: version
        run: |
          INFO=$(./gradlew -q app:printAppInfo)

          VERSION=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['version'])")
          VERSION_MAJOR=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['versionMajor'])")
          VERSION_CODE=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['versionCode'])")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_major=$VERSION_MAJOR" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # 5. Check release exists
      - name: Check existing release
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 6. Decode keystore
      - name: Decode keystore
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      # 7. Build signed APK
      - name: Build release APK
        if: steps.tag_check.outputs.exists == 'false'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 8. Prepare APK
      - name: Prepare APK
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p release-artifacts
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          cp "$APK_PATH" "release-artifacts/DhwaniControl.apk"

      # 9. Pre-release logic
      - name: Determine release type
        if: steps.tag_check.outputs.exists == 'false'
        id: release_type
        run: |
          if [ "${{ steps.version.outputs.version_major }}" -lt 1 ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      # 10. Changelog
      - name: Generate changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges > /tmp/changelog.txt
          else
            git log HEAD --pretty=format:"- %s (%h)" --no-merges | head -30 > /tmp/changelog.txt
          fi

      # 11. Publish release
      - name: Publish GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DhwaniControl"
          prerelease: ${{ steps.release_type.outputs.is_prerelease }}
          draft: false
          body: |
            ## DhwaniControl

            **Version:** ${{ steps.version.outputs.version }}  
            **Version Code:** ${{ steps.version.outputs.version_code }}

            ### Changes
            $(cat /tmp/changelog.txt)

          files: |
            release-artifacts/DhwaniControl.apk
