# ───────────────────
# Pull Request — Debug APK Build & Comment
#
# Triggered on every pull request targeting any branch.
# Cancels any in-progress run for the same PR when a new commit is pushed,
# so only the latest commit's build result ever posts to the PR.
# ───────────────────

name: Debug APK

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]

# One concurrent run per PR. New pushes cancel the previous run.
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # required to post comments on the PR

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Java setup
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # Gradle permissions
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # Extract version from build.gradle.kts
      - name: Extract app version info
        id: version
        run: |
          INFO=$(./gradlew -q app:printAppInfo)
          echo "raw_json=$INFO"

          VERSION=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['version'])")
          VERSION_CODE=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['versionCode'])")
          VERSION_MAJOR=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['versionMajor'])")

          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_major=$VERSION_MAJOR" >> "$GITHUB_OUTPUT"

      # Build Debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Rename APK for clarity
      - name: Rename APK artifact
        run: |
          mkdir -p artifacts
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          cp "$APK_PATH" "artifacts/DhwaniControl-v${{ steps.version.outputs.version }}-debug.apk"

      # Upload artifact
      - name: Upload debug APK
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: DhwaniControl-v${{ steps.version.outputs.version }}-debug-PR${{ github.event.pull_request.number }}
          path: artifacts/DhwaniControl-v${{ steps.version.outputs.version }}-debug.apk
          retention-days: 60

      # Post comment on PR
      - name: Post APK download comment on PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber   = context.payload.pull_request.number;
            const version    = "${{ steps.version.outputs.version }}";
            const runId      = context.runId;
            const repo       = context.repo;
            const artifactName = `DhwaniControl-v${version}-debug-PR${prNumber}`;

            // Build the URL to the Actions run (the artifact is downloadable from there)
            const runUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;

            // shields.io badge — clicking it goes to the Actions run where the artifact lives
            const badgeUrl   = `https://img.shields.io/badge/Download%20APK-v${version}-4CAF50?style=for-the-badge&logo=android&logoColor=white`;
            const commentBody = `## ✅ Debug APK Build Successful

            | Detail | Value |
            |--------|-------|
            | **Version** | \`v${version}\` |
            | **PR** | #${prNumber} |
            | **Artifact** | \`${artifactName}\` |
            | **Expires** | 60 days |

            ---

            ### 📲 Download

            [![Download APK v${version}](${badgeUrl})](${runUrl}#artifacts)

            > **How to download:** Click the badge above → scroll to the **Artifacts** section at the bottom of the Actions run page → click the artifact name.

            ---
            <sub>🤖 This comment is auto-generated by the PR build workflow. A new commit will cancel this run and post a fresh one.</sub>`;

            // Find and delete any previous bot comment on this PR to avoid clutter
            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Debug APK Build Successful')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                ...repo,
                comment_id: botComment.id,
              });
            }

            // Post the fresh comment
            await github.rest.issues.createComment({
              ...repo,
              issue_number: prNumber,
              body: commentBody,
            });
